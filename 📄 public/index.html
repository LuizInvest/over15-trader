<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Betfair Analyzer PRO</title>

<style>
body {
  background: #0b0f1a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

h1 {
  color: #facc15;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap: 20px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid #1f2937;
}

.odd {
  color: #22c55e;
  font-size: 22px;
}

.signal {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🔥 Betfair Analyzer PRO</h1>

<div class="container" id="games"></div>

<script>
async function load() {
  const res = await fetch('/games');
  const data = await res.json();

  const container = document.getElementById('games');
  container.innerHTML = '';

  data.forEach(g => {
    container.innerHTML += `
      <div class="card">
        <h2>${g.home} vs ${g.away}</h2>
        <p>Min: ${g.minute}</p>
        <p>Gols: ${g.goals}</p>
        <p class="odd">Odd: ${g.odds}</p>
        <p>Pressão: ${g.pressure}%</p>
        <p class="signal">${g.signal}</p>
      </div>
    `;
  });
}

setInterval(load, 5000);
load();
</script>

</body>
</html>
