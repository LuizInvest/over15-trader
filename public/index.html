<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trader Múltiplas Safe</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; padding:20px; }
h1 { color:#22c55e; }

.card {
  background:#1e293b;
  padding:15px;
  margin-bottom:10px;
}

.green { border-left:5px solid #22c55e; }
</style>
</head>

<body>

<h1>🔥 MÚLTIPLAS SAFE (2/4)</h1>

<button onclick="load()">🔄 Buscar Jogos</button>

<h2>🎯 TOP 4 JOGOS</h2>
<div id="jogos"></div>

<h2>💰 6 MÚLTIPLAS</h2>
<div id="multiplas"></div>

<script>

async function load() {
  const res = await fetch('/games');
  const data = await res.json();

  renderJogos(data.jogos);
  renderMultiplas(data.multiplas);
}

function renderJogos(jogos) {
  const div = document.getElementById('jogos');
  div.innerHTML = '';

  jogos.forEach(j => {
    div.innerHTML += `
      <div class="card">
        ${j.home} vs ${j.away}<br>
        ${j.time} | odd ${j.odd}
      </div>
    `;
  });
}

function renderMultiplas(multiplas) {
  const div = document.getElementById('multiplas');
  div.innerHTML = '';

  multiplas.forEach(m => {

    div.innerHTML += `
      <div class="card green">
        ${m.jogos[0].home} + ${m.jogos[1].home}<br>
        🔥 Odd: ${m.oddTotal}
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
