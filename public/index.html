<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Over 1.5 Trader PRO</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

h1 {
  color: #22c55e;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px,1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  border-left: 6px solid #334155;
}

.green { border-left: 6px solid #22c55e; }
.orange { border-left: 6px solid orange; }
.red { border-left: 6px solid red; }

.live {
  color: #22c55e;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🔥 OVER 1.5 ANALYZER PRO (SEM API)</h1>

<div class="container" id="games"></div>

<script>

// BASE DE JOGOS (SIMULAÇÃO REALISTA)
const baseGames = [
  { home: "Flamengo", away: "Palmeiras" },
  { home: "Barcelona", away: "Valencia" },
  { home: "Man City", away: "Chelsea" },
  { home: "PSG", away: "Lyon" },
  { home: "Bayern", away: "Dortmund" },
  { home: "Juventus", away: "Milan" },
  { home: "Inter", away: "Roma" },
  { home: "Liverpool", away: "Arsenal" }
];

// GERA JOGOS DINÂMICOS
function generateGames() {
  return baseGames.map(g => {

    const minute = Math.floor(Math.random() * 90);
    const homeGoals = Math.floor(Math.random() * 3);
    const awayGoals = Math.floor(Math.random() * 3);

    const total = homeGoals + awayGoals;

    let pressure = Math.floor(Math.random() * 100);
    let probability = 50;

    if (minute > 10) probability += 10;
    if (minute > 20) probability += 10;
    if (pressure > 70) probability += 15;
    if (total === 1) probability += 20;
    if (total >= 2) probability = 95;

    let signal = "AGUARDAR";

    if (minute >= 10 && minute <= 30 && total === 0 && pressure > 65) {
      signal = "🔥 ENTRAR AGORA";
    }

    return {
      ...g,
      minute,
      homeGoals,
      awayGoals,
      pressure,
      probability,
      signal
    };
  });
}

// RENDER
function render() {
  const games = generateGames();
  const container = document.getElementById('games');
  container.innerHTML = '';

  games.forEach(g => {

    let color = "red";
    if (g.probability >= 80) color = "green";
    else if (g.probability >= 60) color = "orange";

    const div = document.createElement('div');
    div.className = 'card ' + color;

    div.innerHTML = `
      <h3>${g.home} vs ${g.away}</h3>
      <p class="live">AO VIVO - ${g.minute} min</p>
      <p>Placar: ${g.homeGoals} - ${g.awayGoals}</p>
      <p>Pressão: ${g.pressure}%</p>
      <p>Prob Over 1.5: ${g.probability}%</p>
      <h2>${g.signal}</h2>
    `;

    container.appendChild(div);
  });
}

// atualiza automático
setInterval(render, 4000);
render();

</script>

</body>
</html>
