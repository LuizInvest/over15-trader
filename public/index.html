<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Over 1.5 PRO</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}

h1 {
  color: #facc15;
  margin-bottom: 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  border-left: 5px solid #22c55e;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

.top {
  border-left: 5px solid gold;
}

.odd {
  font-size: 20px;
  color: #22c55e;
}

.signal {
  font-weight: bold;
  margin-top: 8px;
}

.live {
  color: #22c55e;
}

.pregame {
  color: #60a5fa;
}
</style>
</head>

<body>

<h1>🔥 OVER 1.5 ANALYZER PRO</h1>

<div class="container" id="games"></div>

<script>
async function load() {
  const res = await fetch('/games');
  const data = await res.json();

  const container = document.getElementById('games');
  container.innerHTML = '';

  data.forEach((g, i) => {
    const div = document.createElement('div');
    div.className = 'card ' + (i === 0 ? 'top' : '');

    div.innerHTML = `
      <h3>#${i+1} ${g.home} vs ${g.away}</h3>

      <p class="${g.minute > 0 ? 'live' : 'pregame'}">
        ${g.minute > 0 ? 'AO VIVO - Min ' + g.minute : 'INÍCIO: ' + g.time}
      </p>

      <p>Placar: ${g.goals}</p>
      <p>Pressão: ${g.pressure}%</p>

      <p class="odd">Odd: ${g.odds}</p>

      <div class="signal">${g.signal}</div>
    `;

    container.appendChild(div);
  });
}

// Atualiza automático
setInterval(load, 5000);
load();
</script>

</body>
</html>
