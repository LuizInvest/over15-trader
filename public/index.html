<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Over 1.5 PRO</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🔥 OVER 1.5 ANALYZER</h1>

<div id="games">Carregando...</div>

<script>
async function load() {
  try {
    const res = await fetch('/games');
    const data = await res.json();

    const el = document.getElementById('games');

    if (!data || data.length === 0) {
      el.innerHTML = "⚠️ Nenhum jogo encontrado";
      return;
    }

    el.innerHTML = '';

    data.forEach(g => {
      el.innerHTML += `
        <div class="card">
          <b>${g.home} vs ${g.away}</b><br>
          ${g.minute > 0 ? 'Min: ' + g.minute : 'Início: ' + g.time}<br>
          Placar: ${g.goals}<br>
          Odd: ${g.odds}<br>
          ${g.signal}
        </div>
      `;
    });

  } catch (err) {
    document.getElementById('games').innerHTML =
      "❌ Erro ao carregar jogos";
    console.log(err);
  }
}

setInterval(load, 5000);
load();
</script>

</body>
</html>
