<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trader PRO</title>
<style>
body { background:#000; color:#fff; font-family:Arial; padding:20px; }
.card { background:#111; padding:15px; margin:10px; border-radius:10px; }
</style>
</head>

<body>

<h1>🔥 TRADER OVER 1.5</h1>
<div id="app"></div>

<script>
async function load(){
  const res = await fetch('/games');
  const data = await res.json();

  const app = document.getElementById('app');
  app.innerHTML='';

  data.forEach(g=>{
    app.innerHTML += `
      <div class="card">
        <b>${g.home} vs ${g.away}</b><br>
        Min: ${g.minute}<br>
        Gols: ${g.goals}<br>
        Odd: ${g.odds}<br>
        <b>${g.signal}</b>
      </div>
    `;
  });
}

setInterval(load,3000);
load();
</script>

</body>
</html>
